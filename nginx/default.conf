server {
    listen 80;

    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # 開発環境では HTTP のみを使用（X-Forwarded-Proto を設定しない）
    location /static/ { 
        alias /static/;
    }

    # location /static/ { 
    #     alias /app/staticfiles/;
    # }

    location /admin/ {
        proxy_pass http://django-web:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 開発環境では X-Forwarded-Proto を設定しない（HTTP のみ）
    }
    
    location /api/ {
        proxy_pass http://django-web:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 開発環境では X-Forwarded-Proto を設定しない
    }

    location / {
        proxy_pass http://nextjs-web:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 開発環境では X-Forwarded-Proto を設定しない
    }
    
    # デバック用　開発時は削除 debug_now
    location /_next/ {
        proxy_pass http://nextjs-web:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_cache_bypass $http_upgrade;
    }

}

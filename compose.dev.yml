# docker-compose.override.yml
version: "3.9"

services:
  django-web:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./backend:/app:cached            # ← ホスト側のコードをマウント、cachedでI/O改善
      - static_volume:/app/staticfiles
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    depends_on:
      - db

  nextjs-web:
    build:
      context: ./frontend
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ./frontend:/app:cached           # ← ホスト側のコードマウント、高速化
      - /app/node_modules                # ← node_modules はコンテナ内のみ
    environment:
      NODE_ENV: development
    command: pnpm dev --turbo                     # ← Turbopack 対応なら: pnpm dev --turbo
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true